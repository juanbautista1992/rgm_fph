<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Portal Web FPH - 2026 (V1) - Aura</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500&display=swap');

            html, body { width: 100%; height: 100%; padding: 0; margin: 0; font-family: 'Montserrat', sans-serif; overflow: hidden; background-color: #f0f0f0;}
            
            /* Cabecera con Transparencia Leve y Logo a la Izquierda */
            #header {
                position: absolute; top: 0; width: 100%; height: 65px;
                background: rgba(0, 51, 102, 0.75); /* Transparencia leve */
                backdrop-filter: blur(8px);
                color: white;
                display: flex; align-items: center; justify-content: flex-start;
                z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.3);
                padding: 0 20px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .header-logo { height: 45px; margin-right: 20px; }
            #header h1 { margin: 0; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: baseline; }
            #header h1 .geovisor { font-size: 1.6rem; font-weight: 500; color: #00f2fe; }
            #header h1 .foundation { font-size: 0.85rem; font-weight: 400; opacity: 0.9; margin-left: 12px; font-family: 'Montserrat'; }

            /* Buscador Horizontal Debajo del Título */
            #search-bar-container {
                position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
                z-index: 1000; display: flex; align-items: center;
                background: rgba(255, 255, 255, 0.9);
                padding: 5px 15px; border-radius: 30px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                border: 1px solid rgba(0,242,254,0.5);
                backdrop-filter: blur(5px);
            }
            #search-input {
                border: none; background: transparent; padding: 8px; width: 250px;
                font-family: 'Montserrat'; font-size: 0.9rem; outline: none;
            }
            #btn-zoom-municipio {
                background: #003366; color: white; border: none; padding: 8px 15px;
                border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.75rem;
                margin-left: 10px; transition: 0.3s; text-transform: uppercase;
            }
            #btn-zoom-municipio:hover { background: #00f2fe; color: #003366; }

            #map { width: 100%; height: calc(100% - 65px); margin-top: 65px; }

            /* Paneles (Sidebar y Capas) con Diseño Unificado */
            .custom-panel {
                position: absolute; background: rgba(255,255,255,0.95); z-index: 1001;
                border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                border-top: 6px solid #00f2fe; border-bottom: 6px solid #4facfe;
                transition: all 0.3s ease; overflow-y: auto;
            }
            
            /* Panel Izquierdo (Información) */
            #sidebar { top: 130px; left: 20px; width: 320px; max-height: 70%; display: none; }

            /* Panel Derecho (Capas - Simbología) */
            #layer-panel { top: 130px; right: 20px; width: 300px; max-height: 70%; display: none; }
            
            .panel-header { 
                padding: 15px 20px; border-bottom: 1px solid #eee; 
                display: flex; justify-content: space-between; align-items: center;
                background: rgba(0,51,102,0.03);
            }
            .panel-header h2 { 
                margin: 0; font-family: 'Oswald', sans-serif; font-size: 1.1rem; 
                color: #003366; text-transform: uppercase; letter-spacing: 1px;
            }

            .sidebar-content { padding: 20px; }
            .close-btn { cursor: pointer; font-size: 1.2rem; color: #888; transition: 0.2s; }
            .close-btn:hover { color: #d32f2f; }
            
            /* Estilo de tablas de info */
            #feature-info table { width: 100%; border-collapse: collapse; }
            #feature-info th { text-align: left; font-size: 0.8rem; background: rgba(0,51,102,0.05); padding: 8px; color: #666;}
            #feature-info td { font-size: 0.85rem; padding: 8px; border-bottom: 1px solid #eee; }
            #feature-info img { width: 100%; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

            /* Botones Flotantes */
            .floating-controls { position: absolute; right: 20px; top: 75px; z-index: 1000; display: flex; flex-direction: row; gap: 10px; }
            .circle-btn {
                width: 45px; height: 45px; background: white; border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; color: #003366; transition: 0.3s;
            }
            .circle-btn:hover { background: #003366; color: white; transform: scale(1.1); }

            /* Ajuste del control de capas de Leaflet para que entre en nuestro panel */
            .leaflet-control-layers-tree { border: none !important; box-shadow: none !important; background: transparent !important; padding: 0 !important; }
            .rgm-icon { background-color: #d32f2f; width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid white; margin-right: 8px;}
        </style>
    </head>
    <body>
        <div id="header">
            <img src="imágenes/fph.png" class="header-logo" alt="Logo FPH">
            <h1><span class="geovisor">GEOVISOR</span><span class="foundation">Fundación Pro Hábitat - 2026 V1</span></h1>
        </div>

        <div id="search-bar-container">
            <i class="fas fa-search" style="color:#003366"></i>
            <input type="text" id="search-input" placeholder="Escriba un municipio (Ej: Punata)...">
            <button id="btn-zoom-municipio">Zoom al Municipio</button>
        </div>

        <div class="floating-controls">
            <div class="circle-btn" onclick="toggleLayerPanel()" title="Simbología y Capas"><i class="fas fa-layer-group"></i></div>
        </div>

        <div id="sidebar" class="custom-panel">
            <div class="panel-header">
                <h2>Información del Punto</h2>
                <span class="close-btn" onclick="closeSidebar()">&times;</span>
            </div>
            <div class="sidebar-content" id="feature-info"></div>
        </div>

        <div id="layer-panel" class="custom-panel">
            <div class="panel-header">
                <h2>Simbología / Referencias</h2>
                <span class="close-btn" onclick="toggleLayerPanel()">&times;</span>
            </div>
            <div class="sidebar-content" id="layer-tree-container">
                </div>
        </div>

        <div id="map"></div>

        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        
        <script src="datos/MANZANOSINE2024_0.js"></script>
        <script src="datos/MUNICIPIOS_CBBA_1.js"></script>
        <script src="datos/AUs_CBBA_2.js"></script>
        <script src="datos/RGM1_3.js"></script>

        <script>
        // Inicializar mapa quitando la bandera de Leaflet
        var map = L.map('map', {
            zoomControl: false,
            attributionControl: false 
        }).fitBounds([[-17.6405,-65.9694],[-17.5453,-65.8554]]);

        // Atribución personalizada
        L.control.attribution({prefix: 'JUAN BAUTISTA | FPH 2026'}).addTo(map);

        // Mapas Base
        var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}');
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var sinMapa = L.layerGroup();

        // Estilos
        function style_RGM() { return {radius: 8, fillColor: '#d32f2f', color: 'white', weight: 3, fillOpacity: 1}; }

        var layer_MANZANOS = L.geoJson(json_MANZANOSINE2024_0, {style: {color:'#aaa', weight:1, fillOpacity:0.15}}).addTo(map);
        var layer_MUNICIPIOS = L.geoJson(json_MUNICIPIOS_CBBA_1, {style: {color:'blue', weight:3, fill:false}}).addTo(map);
        var layer_AUs = L.geoJson(json_AUs_CBBA_2, {style: {color:'#333', weight:2, fill:false}}).addTo(map);

        var layer_RGM = L.geoJson(json_RGM1_3, {
            pointToLayer: function (f, latlng) { return L.circleMarker(latlng, style_RGM()); },
            onEachFeature: function(f, l) {
                l.on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    var p = f.properties;
                    var html = '<table>';
                    html += '<tr><th>Punto RGM:</th><td>' + (p.Punto || 'S/N') + '</td></tr>';
                    html += '<tr><th>Norte:</th><td>' + (p.Norte || '-') + '</td></tr>';
                    html += '<tr><th>Este:</th><td>' + (p.Este || '-') + '</td></tr>';
                    if(p.Foto) {
                        var n = String(p.Foto).split(/[\\/]/).pop();
                        html += '<tr><td colspan="2"><img src="imágenes/'+n+'" onerror="this.src=\'https://via.placeholder.com/250x150?text=Foto+no+encontrada\'"></td></tr>';
                    }
                    html += '</table>';
                    document.getElementById('feature-info').innerHTML = html;
                    document.getElementById('sidebar').style.display = 'block';
                });
            }
        }).addTo(map);

        // Arbol de Capas
        var baseTree = { label: 'Mapas Referenciales Base', children: [ {label: 'Satélite Google', layer: googleSat}, {label: 'OpenStreetMap', layer: osm}, {label: 'Sin Mapa Base', layer: sinMapa} ] };
        var overlaysTree = [
            { label: '<span class="rgm-icon"></span> Puntos RGM', layer: layer_RGM },
            { label: 'Municipios CBBA', layer: layer_MUNICIPIOS },
            { label: 'Áreas Urbanas', layer: layer_AUs },
            { label: 'Manzanos', layer: layer_MANZANOS }
        ];

        var layerControl = L.control.layers.tree(baseTree, overlaysTree, {collapsed:false});
        layerControl.addTo(map);
        
        // Mover la leyenda al panel derecho personalizado
        var htmlLeyenda = layerControl.getContainer();
        document.getElementById('layer-tree-container').appendChild(htmlLeyenda);

        // Funciones de Paneles
        function closeSidebar() { document.getElementById('sidebar').style.display = 'none'; }
        function toggleLayerPanel() {
            var p = document.getElementById('layer-panel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        // --- LÓGICA DEL BUSCADOR DE MUNICIPIOS ---
        document.getElementById('btn-zoom-municipio').addEventListener('click', function() {
            var text = document.getElementById('search-input').value.toLowerCase().trim();
            var found = false;
            layer_MUNICIPIOS.eachLayer(function(layer) {
                if (layer.feature.properties.municipio && layer.feature.properties.municipio.toLowerCase().includes(text)) {
                    map.fitBounds(layer.getBounds());
                    found = true;
                }
            });
            if (!found) alert("No se encontró el municipio: " + text);
        });

        // Controles adicionales
        L.control.zoom({position:'topright'}).addTo(map);
        L.control.locate({position:'topright'}).addTo(map);
        map.on('click', function() { closeSidebar(); });

        </script>
    </body>
</html>
