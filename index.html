<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Portal Web FPH - 2026</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">

        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                overflow: hidden;
            }
            
            /* Título Superior */
            #header {
                position: absolute;
                top: 0;
                width: 100%;
                height: 60px;
                background-color: #003366; /* Azul Institucional */
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            }
            
            #header h1 {
                margin: 0;
                font-size: 1.2rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            #map {
                width: 100%;
                height: calc(100% - 60px);
                margin-top: 60px;
            }

            /* Panel Lateral Estilo Atlas */
            #sidebar {
                position: absolute;
                top: 70px;
                left: 10px;
                width: 320px;
                max-height: 80%;
                background: white;
                z-index: 999;
                overflow-y: auto;
                display: none; /* Se oculta por defecto */
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                border-top: 5px solid #e74c3c; /* Color llamativo */
            }

            .sidebar-content {
                padding: 15px;
            }

            .sidebar-logo {
                display: block;
                margin: 0 auto 15px;
                max-width: 120px;
            }

            .sidebar-content h2 {
                font-size: 1.1rem;
                color: #333;
                border-bottom: 2px solid #eee;
                padding-bottom: 5px;
            }

            /* Estilo de tabla dentro del panel */
            .sidebar-content table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }

            .sidebar-content td {
                padding: 8px;
                border-bottom: 1px solid #f0f0f0;
                font-size: 0.9rem;
            }

            .sidebar-content th {
                text-align: left;
                background: #f9f9f9;
                padding: 8px;
                font-size: 0.8rem;
                color: #666;
            }

            .sidebar-content img {
                width: 100%;
                border-radius: 4px;
                margin-top: 10px;
                border: 2px solid #ddd;
            }

            .close-sidebar {
                float: right;
                cursor: pointer;
                font-size: 1.5rem;
                line-height: 1;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <h1>Portal Web de la Fundación Pro Hábitat - 2026</h1>
        </div>

        <div id="sidebar">
            <div class="sidebar-content">
                <span class="close-sidebar" onclick="closeSidebar()">&times;</span>
                <img src="images/fph.png" class="sidebar-logo" alt="Logo FPH">
                <div id="feature-info">
                    <p style="text-align:center; color:#888;">Haga clic en un punto para ver detalles</p>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/MANZANOSINE2024_0.js"></script>
        <script src="data/MUNICIPIOS_CBBA_1.js"></script>
        <script src="data/AUs_CBBA_2.js"></script>
        <script src="data/RGM1_3.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-17.64,-65.96],[-17.54,-65.85]]);

        // --- MAPAS BASE (DINÁMICOS Y GRATUITOS) ---
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        });

        var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps'
        });

        var lightMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(map);

        var baseMaps = {
            "Mapa Claro": lightMap,
            "Satélite Google": googleSat,
            "OpenStreetMap": osm
        };

        // --- FUNCIONES DE PANEL LATERAL ---
        function showSidebar(content) {
            document.getElementById('feature-info').innerHTML = content;
            document.getElementById('sidebar').style.display = 'block';
        }

        function closeSidebar() {
            document.getElementById('sidebar').style.display = 'none';
        }

        // Cerrar panel si se hace clic en el mapa (fuera de un objeto)
        map.on('click', function() {
            closeSidebar();
        });

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        // --- CAPA RGM (PUNTOS CON FOTO) ---
        function pop_RGM1_3(feature, layer) {
            var content = '<h2>Detalles del Punto RGM</h2>' +
                          '<table>' +
                          '<tr><th>Punto:</th><td>' + (feature.properties['Punto'] || 'N/A') + '</td></tr>' +
                          '<tr><th>Norte:</th><td>' + (feature.properties['Norte'] || 'N/A') + '</td></tr>' +
                          '<tr><th>Este:</th><td>' + (feature.properties['Este'] || 'N/A') + '</td></tr>' +
                          '</table>';
            
            if (feature.properties['Foto']) {
                // Limpieza de nombre de foto igual que en qgis2web
                var imgName = String(feature.properties['Foto']).replace(/[\\/:]/g, '_').trim();
                content += '<img src="images/' + imgName + '" alt="Foto RGM">';
            }

            layer.on('click', function(e) {
                L.DomEvent.stopPropagation(e); // Evita cerrar el panel al hacer clic
                showSidebar(content);
            });
        }

        map.createPane('pane_RGM1_3');
        map.getPane('pane_RGM1_3').style.zIndex = 600;

        var layer_RGM1_3 = new L.geoJson(json_RGM1_3, {
            pane: 'pane_RGM1_3',
            onEachFeature: pop_RGM1_3,
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 8.0,
                    color: 'white',
                    weight: 2,
                    fillColor: '#d32f2f',
                    fillOpacity: 1
                });
            }
        }).addTo(map);

        // --- OTRAS CAPAS (MUNICIPIOS, MANZANOS) ---
        var layer_MUNICIPIOS_CBBA_1 = new L.geoJson(json_MUNICIPIOS_CBBA_1, {
            style: { color: 'rgba(0,51,102,1.0)', weight: 2, fillOpacity: 0 }
        }).addTo(map);

        var layer_MANZANOSINE2024_0 = new L.geoJson(json_MANZANOSINE2024_0, {
            style: { color: '#aaa', weight: 0.5, fillOpacity: 0 }
        }).addTo(map);

        // --- CONTROLES ---
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.control.layers(baseMaps, {
            "Puntos RGM": layer_RGM1_3,
            "Municipios": layer_MUNICIPIOS_CBBA_1,
            "Manzanos": layer_MANZANOSINE2024_0
        }, {collapsed: false}).addTo(map);

        L.control.locate({position: 'topright'}).addTo(map);

        </script>
    </body>
</html>
